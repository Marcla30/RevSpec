server {
    listen 80;
    listen [::]:80;
    server_name revspec.marcla.fr revspec.fr www.revspec.fr;

    root /var/www/revspec;
    index index.html;

    # Keep HTML fresh (no long cache)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Long cache for static assets (fixes Lighthouse 'cache TTL none')
    location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|svg|webp|avif|ico|xml|json)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Main route handling
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Optional: enable if Brotli module is installed
    # brotli on;
    # brotli_comp_level 5;
    # brotli_static on;
    # brotli_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
}
